<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Getrin — Portal do Trabalhador</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/portal.css" />
</head>
<body>

<div class="app">

  <div id="sidebar-mount"></div>

  <div class="main">

    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Meus treinamentos</span>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="openPortalSettings()">
          <i class="ti ti-settings"></i>Configurações
        </button>
        <button class="btn" onclick="showToast('Certificados disponíveis.')">
          <i class="ti ti-certificate"></i>Meus certificados
        </button>
      </div>
    </div>

    <div class="content-area">
      
      <!-- Seção de Configurações (Escondida por padrão) -->
      <div id="portal-settings-section" style="display: none; margin-bottom: 24px;">
        <div class="section-div">Minhas Configurações</div>
        <div class="panel" style="padding: 20px;">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div class="form-field">
              <label class="form-label">Nome Completo</label>
              <input type="text" id="setting-name" class="form-input" placeholder="Seu nome" />
            </div>
            <div class="form-field">
              <label class="form-label">Iniciais</label>
              <input type="text" id="setting-initials" class="form-input" maxlength="2" placeholder="Ex: JD" />
            </div>
            <div class="form-field">
              <label class="form-label">Telefone</label>
              <input type="text" id="setting-phone" class="form-input" placeholder="(00) 00000-0000" />
            </div>
            <div class="form-field">
              <label class="form-label">E-mail (Apenas leitura)</label>
              <input type="text" id="setting-email" class="form-input" readonly style="background: var(--surface-2); cursor: not-allowed;" />
            </div>
          </div>
          <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn" onclick="closePortalSettings()">Cancelar</button>
            <button class="btn btn-primary" onclick="savePortalSettings()">Salvar Alterações</button>
          </div>
        </div>
      </div>

      <!-- Banner de conformidade -->
      <div class="portal-banner">
        <div class="portal-pct-block">
          <div class="portal-big-pct" id="portal-compliance">--%</div>
          <div>
            <div class="portal-status-name">Conformidade atual</div>
            <div class="portal-status-sub" id="portal-sub">Carregando treinamentos...</div>
          </div>
        </div>
        <span id="portal-badge"></span>
      </div>

      <!-- Pendentes -->
      <div class="section-div">Pendentes e em andamento</div>
      <div class="panel">
        <table>
          <thead>
            <tr>
              <th style="width:28%">Treinamento</th>
              <th style="width:9%">Norma</th>
              <th style="width:20%">Progresso</th>
              <th style="width:18%">Prazo / Vencimento</th>
              <th style="width:13%">Status</th>
              <th style="width:12%">Ação</th>
            </tr>
          </thead>
          <tbody id="pending-tbody"></tbody>
        </table>
      </div>

      <!-- Concluídos -->
      <div class="section-div">Concluídos e válidos</div>
      <div class="panel">
        <table>
          <thead>
            <tr>
              <th style="width:32%">Treinamento</th>
              <th style="width:10%">Norma</th>
              <th style="width:16%">Conclusão</th>
              <th style="width:18%">Válido até</th>
              <th style="width:12%">Status</th>
              <th style="width:12%">Certificado</th>
            </tr>
          </thead>
          <tbody id="completed-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="/js/tutor.js"></script>
<script src="/js/data.js"></script>
<script src="/js/portal.js"></script>
</body>
</html>
