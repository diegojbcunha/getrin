<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Getrin — Login</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo-name">
      g<span>etrin</span>
      <div class="logo-pip" style="width:6px;height:6px;margin-left:4px;"></div>
    </div>
    <div class="login-logo-sub">Gestão de Treinamentos Regulatórios</div>

    <hr class="login-divider" />

    <!-- E-mail -->
    <div class="form-field">
      <label class="form-label" for="email">E-mail corporativo</label>
      <input class="form-input" id="email" type="email"
             placeholder="seu@email.com.br" autocomplete="email" />
    </div>

    <!-- Senha -->
    <div class="form-field">
      <label class="form-label" for="password">Senha</label>
      <input class="form-input" id="password" type="password" placeholder="Sua senha" />
    </div>

    <!-- Seletor de perfil -->
    <div class="form-field">
      <label class="form-label" style="margin-bottom:8px;">Perfil de acesso</label>
      <div class="role-selector">
        <div class="role-option selected" data-role="admin" onclick="setLoginRole('admin')">
          <i class="ti ti-shield"></i>Admin
        </div>
        <div class="role-option" data-role="manager" onclick="setLoginRole('manager')">
          <i class="ti ti-users"></i>Gestor
        </div>
        <div class="role-option" data-role="worker" onclick="setLoginRole('worker')">
          <i class="ti ti-user"></i>Trabalhador
        </div>
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">Entrar no sistema</button>
    <button class="login-btn" onclick="openSignupModal()" style="background:transparent; color:var(--primary); border: 1px solid var(--primary); margin-top: 8px;">Criar nova conta</button>

    <!-- Empresa -->
    <div class="login-company">
      <i class="ti ti-building-factory-2"></i>
      <span>Metalúrgica Nordeste S.A.</span>
    </div>

  </div>
</div>

<div class="modal-overlay" id="modal-signup" style="display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999;">
  <div class="modal-box" style="background: var(--surface); width: 100%; max-width: 400px; padding: 24px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="margin: 0; font-size: 18px; color: var(--text);">Criar nova conta</h3>
      <i class="ti ti-x" style="cursor: pointer; font-size: 20px; color: var(--text-3);" onclick="closeSignupModal()"></i>
    </div>
    
    <div id="signup-error" style="display:none; background: var(--red-100); color: var(--red-700); padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;"></div>
    <div id="signup-success" style="display:none; background: #dcfce7; color: #166534; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;"></div>

    <div class="form-field" style="margin-bottom: 16px;">
      <label class="form-label">E-mail</label>
      <input class="form-input" id="signup-email" type="email" placeholder="seu@email.com" />
    </div>
    <div class="form-field" style="margin-bottom: 16px;">
      <label class="form-label">Senha</label>
      <input class="form-input" id="signup-password" type="password" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="form-field" style="margin-bottom: 16px;">
      <label class="form-label">ID da Empresa (Opcional)</label>
      <input class="form-input" id="signup-company-id" type="text" placeholder="UUID da empresa" value="00000000-0000-0000-0000-000000000000" />
      <small style="color: var(--text-3); font-size: 11px;">Padrão: Empresa Padrão</small>
    </div>
    <div class="form-field" style="margin-bottom: 24px;">
      <label class="form-label">Perfil de Acesso</label>
      <select class="form-input" id="signup-role" style="width: 100%;" onchange="toggleSignupInviteField()">
        <option value="worker">Trabalhador</option>
        <option value="manager">Gestor</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <div class="form-field" id="signup-invite-wrap" style="display:none; margin-bottom: 24px;">
      <label class="form-label">Código de convite</label>
      <input class="form-input" id="signup-invite-code" type="text" placeholder="Código fornecido pela administração" />
    </div>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button class="btn" onclick="closeSignupModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-submit-signup" onclick="submitSignup()">Confirmar Criação</button>
    </div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
