<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Getrin — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Filtro de dias 30 / 60 / 90 */
    .days-filter {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--gray-50);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
    }
    .days-filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: calc(var(--radius) - 1px);
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .days-filter-btn.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }
    .days-filter-btn:hover:not(.active) { background: rgba(0,0,0,.04); }
  </style>
</head>
<body>

<div class="app">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Painel Geral</span>
      </div>
      <div class="topbar-right">
        <!-- RF14: seletor de período de vencimento -->
        <div class="days-filter" title="Treinamentos vencendo em...">
          <button class="days-filter-btn active" data-days="30" onclick="loadDashboard(30)">30d</button>
          <button class="days-filter-btn"        data-days="60" onclick="loadDashboard(60)">60d</button>
          <button class="days-filter-btn"        data-days="90" onclick="loadDashboard(90)">90d</button>
        </div>
        <button class="btn" onclick="window.location.href='/html/reports.html'">
          <i class="ti ti-chart-bar"></i>Relatórios
        </button>
      </div>
    </div>

    <div class="content-area">

      <!-- Métricas -->
      <div class="metrics-row">
        <div class="metric-card">
          <div class="metric-label">Conformidade geral</div>
          <div class="metric-value c-accent" id="metric-compliance">—</div>
          <div class="metric-sub">Média de todos os trabalhadores</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Trabalhadores ativos</div>
          <div class="metric-value" id="metric-workers">—</div>
          <div class="metric-sub">Cadastrados no sistema</div>
        </div>
        <div class="metric-card">
          <!-- Label atualizado dinamicamente pelo JS conforme o filtro -->
          <div class="metric-label" id="metric-expiring-label">Vencendo em 30 dias</div>
          <div class="metric-value c-warn" id="metric-expiring">—</div>
          <div class="metric-sub">Requer ação imediata</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Não conformes</div>
          <div class="metric-value c-danger" id="metric-noncompliant">—</div>
          <div class="metric-sub">Status vermelho</div>
        </div>
      </div>

      <!-- Alertas -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Alertas ativos</span>
        </div>
        <div id="alerts-list">
          <div style="padding:16px;text-align:center;color:var(--text-3);font-size:12px;">Carregando...</div>
        </div>
      </div>

      <!-- Atividade recente -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Atividade recente</span>
          <button class="btn btn-sm" onclick="window.location.href='/html/reports.html'">Ver relatório</button>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:22%">Trabalhador</th>
              <th style="width:28%">Treinamento</th>
              <th style="width:14%">Norma</th>
              <th style="width:18%">Data</th>
              <th style="width:18%">Status</th>
            </tr>
          </thead>
          <tbody id="activity-tbody">
            <tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-3);">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
